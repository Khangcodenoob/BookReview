{% extends "base.html" %}
{% block title %}Liên hệ quản trị viên - Chạm Sách{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 600px; margin: 40px auto; padding: 0 20px;">
  <div class="auth-card" style="width: 100%; max-width: 100%;">
    <div class="auth-header">
      <h2>Liên hệ quản trị viên</h2>
      <p>Chúng tôi luôn sẵn sàng lắng nghe và hỗ trợ bạn.</p>
    </div>

    <form method="post" class="form auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label for="name" class="form-label">Họ tên</label>
        <input type="text" id="name" name="name" class="form-input" placeholder="Nhập tên của bạn" required {% if
          current_user.is_authenticated %}value="{{ current_user.username }}" {% endif %}>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="Nhập email liên hệ" required {% if
          current_user.is_authenticated %}value="{{ current_user.email }}" {% endif %}>
      </div>

      <div class="form-group">
        <label for="subject" class="form-label">Chủ đề</label>
        <input type="text" id="subject" name="subject" class="form-input" placeholder="Chủ đề bạn muốn thảo luận"
          required>
      </div>

      <div class="form-group">
        <label for="message" class="form-label">Nội dung</label>
        <textarea id="message" name="message" class="form-input" rows="5"
          placeholder="Nhập nội dung tin nhắn của bạn..." required
          style="resize: vertical; min-height: 120px;"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Gửi tin nhắn</button>
    </form>
  </div>
</div>
{% endblock %}
